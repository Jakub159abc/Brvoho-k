<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa tagů bylinek</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Správa tagů bylinek</h1>
        </header>

        <div class="upload-section">
            <label for="fileInput" class="file-input-label">
                <span>📁 Načíst Excel soubor</span>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
            </label>
            <p class="file-name" id="fileName"></p>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Zadejte název bylinky pro vyhledání..."
                disabled
            >
            <div id="searchResults" class="search-results"></div>
        </div>

        <div class="form-section" id="formSection" style="display: none;">
            <h2>Úprava tagů pro: <span id="selectedHerbName"></span></h2>
            <form id="tagForm">
                <div id="formFields"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Uložit změny</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Zrušit</button>
                </div>
            </form>
        </div>

        <div class="download-section" id="downloadSection" style="display: none;">
            <button id="downloadBtn" class="btn btn-success">⬇️ Stáhnout upravený soubor</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
