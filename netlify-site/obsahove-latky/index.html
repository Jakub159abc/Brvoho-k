<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsahové látky</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="page-shell page-shell--wide">
  <header class="site-header">
    <a href="/" class="back-home">← Hlavní menu</a>
  </header>
  <main class="page-inner page-inner--embed">
    <h1 class="visually-hidden">Obsahové látky</h1>
    <iframe
      class="obsahove-latky-iframe"
      title="Obsahové látky"
      src="/obsahove-latky/aplikace.html"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      id="obsahove-latky-frame"
    ></iframe>
    <p class="muted obsahove-latky-fallback">
      Pokud se obsah nezobrazí, zkuste stránku znovu načíst nebo otevřít
      <a href="/obsahove-latky/aplikace.html" target="_blank" rel="noopener">Obsahové látky (samostatné okno)</a>.
    </p>
    <div class="page-actions">
      <a class="btn-primary" href="/">Zpět na menu</a>
    </div>
  </main>
  <script>
  (function () {
    var q = window.location.search;
    if (!q) return;
    var f = document.getElementById("obsahove-latky-frame");
    if (f) f.src = "/obsahove-latky/aplikace.html" + q;
  })();
  </script>
</body>
</html>
