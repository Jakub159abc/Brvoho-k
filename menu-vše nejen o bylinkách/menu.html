<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vše nejen o bylinkách</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #2d5016;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .menu-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #f1f8f4;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .menu-title {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 700;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .menu-item {
            text-align: center;
        }

        .menu-button {
            display: block;
            text-decoration: none;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            margin: 0;
            text-align: center;
        }

        .menu-button img {
            width: 200px;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            border: none;
            border-radius: 0;
            box-shadow: none;
            transition: all 0.3s ease;
            display: block;
        }

        .menu-button:hover img {
            transform: scale(1.1) translateY(-5px);
        }

        .menu-item:hover .menu-label {
            transform: scale(1.1);
            transition: transform 0.3s ease;
        }

        .kalendar-sberu .menu-button img {
            width: 260px;
            max-height: 260px;
        }

        .kalendar-sberu .menu-label {
            margin-left: 38px;
        }

        .menu-label {
            margin-top: 10px;
            color: #558b2f;
            font-size: 1.1em;
            font-weight: 500;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        /* Responzivní design */
        @media (max-width: 768px) {
            .menu-container {
                padding: 15px;
            }
            
            .menu-title {
                font-size: 1.8em;
            }

            .menu-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .menu-button img {
                width: 200px;
                max-height: 200px;
            }

            .kalendar-sberu .menu-button img {
                width: 260px;
                max-height: 260px;
            }

            .kalendar-sberu .menu-label {
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .menu-button img {
                width: 200px;
                max-height: 200px;
            }

            .kalendar-sberu .menu-button img {
                width: 260px;
                max-height: 260px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1 class="menu-title">Vše nejen o bylinkách</h1>
        
        <div class="menu-grid">
            <!-- Vyhledávání rostlin -->
            <div class="menu-item">
                <a href="https://www.brvohorik.cz/vyhledavani-bylinek/" class="menu-button" target="_self">
                    <img src="https://5894bc8f2a.clvaw-cdnwnd.com/9c5c0180b020bd4a2c598d6ffeaae1da/200000936-4023540237/Vyhled%C3%A1v%C3%A1n%C3%AD%20rostlin%20o%C5%99%C3%ADznut%C3%BD.png?ph=5894bc8f2a" alt="Vyhledávání rostlin" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div style="display:none; padding: 20px; background: #f0f0f0; border-radius: 8px; color: #999;">
                        Obrázek - URL adresa<br>není nastavena
                    </div>
                    <div class="menu-label">Vyhledávání rostlin</div>
                </a>
            </div>

            <!-- Články o rostlinách -->
            <div class="menu-item">
                <a href="https://www.brvohorik.cz/clanky-o-rostlinach/" class="menu-button" target="_self">
                    <img src="https://5894bc8f2a.clvaw-cdnwnd.com/9c5c0180b020bd4a2c598d6ffeaae1da/200000927-929ce929d0/%C4%8Dl%C3%A1nky%20o%20rostlin%C3%A1ch%20v%C3%BD%C5%99ez.png?ph=5894bc8f2a" alt="Články o rostlinách" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div style="display:none; padding: 20px; background: #f0f0f0; border-radius: 8px; color: #999;">
                        Obrázek - URL adresa<br>není nastavena
                    </div>
                    <div class="menu-label">Články o rostlinách</div>
                </a>
            </div>

            <!-- Duševní příčiny nemocí -->
            <div class="menu-item">
                <a href="https://www.brvohorik.cz/dusevni-priciny-nemoci/" class="menu-button" target="_self">
                    <img src="https://5894bc8f2a.clvaw-cdnwnd.com/9c5c0180b020bd4a2c598d6ffeaae1da/200000929-94bcb94bce/Duchovn%C3%AD%20p%C5%99%C3%AD%C4%8Diny%20nemoc%C3%AD%20v%C3%BD%C5%99ez.png?ph=5894bc8f2a" alt="Duševní příčiny nemocí" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div style="display:none; padding: 20px; background: #f0f0f0; border-radius: 8px; color: #999;">
                        Obrázek - URL adresa<br>není nastavena
                    </div>
                    <div class="menu-label">Duševní příčiny nemocí</div>
                </a>
            </div>

            <!-- Recepty a návody -->
            <div class="menu-item">
                <a href="https://www.brvohorik.cz/recepty-a-navody/" class="menu-button" target="_self">
                    <img src="https://5894bc8f2a.clvaw-cdnwnd.com/9c5c0180b020bd4a2c598d6ffeaae1da/200000932-678f7678f9/recepty%20a%20n%C3%A1vody%20v%C3%BD%C5%99ez.png?ph=5894bc8f2a" alt="Recepty a návody" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div style="display:none; padding: 20px; background: #f0f0f0; border-radius: 8px; color: #999;">
                        Obrázek - URL adresa<br>není nastavena
                    </div>
                    <div class="menu-label">Recepty a návody</div>
                </a>
            </div>

            <!-- Kalendář sběru -->
            <div class="menu-item kalendar-sberu">
                <a href="https://www.brvohorik.cz/kalendar-sberu/" class="menu-button" target="_self">
                    <img src="https://5894bc8f2a.clvaw-cdnwnd.com/9c5c0180b020bd4a2c598d6ffeaae1da/200000930-a9b67a9b69/Kalend%C3%A1%C5%99%20sb%C4%9Bru%20o%C5%99%C3%ADznut%C3%A9.png?ph=5894bc8f2a" alt="Kalendář sběru" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div style="display:none; padding: 20px; background: #f0f0f0; border-radius: 8px; color: #999;">
                        Obrázek - URL adresa<br>není nastavena
                    </div>
                    <div class="menu-label">Kalendář sběru</div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
